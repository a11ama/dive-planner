<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目的地詳細 — 潛旅資料庫</title>
<style>
  :root{--teal:#0F6E56;--teal-light:#E1F5EE;--teal-mid:#1D9E75;--teal-dark:#0a5240;--amber:#BA7517;--amber-light:#FAEEDA;--red:#C0392B;--red-light:#FFF0EE;--border:#E0E4EA;--bg:#F4F6F9;--white:#fff;--secondary:#555;--muted:#888;--dark:#1A1A1A}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'PingFang TC','Microsoft JhengHei',Arial,sans-serif;background:var(--bg);color:var(--dark);font-size:14px}
  .topbar{color:#fff;padding:14px 24px;display:flex;align-items:center;gap:14px}
  .back-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;color:#fff;transition:background .15s;white-space:nowrap}
  .back-btn:hover{background:rgba(255,255,255,.35)}
  .topbar-badge{font-size:11px;background:rgba(255,255,255,.18);border-radius:12px;padding:3px 10px;white-space:nowrap}
  .dest-hero{padding:28px 28px 0}
  .dest-code-badge{display:inline-block;font-size:28px;font-weight:900;letter-spacing:2px;padding:10px 22px;border-radius:10px;color:#fff;margin-bottom:14px;font-family:'Courier New',monospace}
  .dest-fullname{font-size:26px;font-weight:800;color:var(--dark);margin-bottom:6px}
  .dest-tagline{font-size:14px;color:var(--secondary);margin-bottom:16px;line-height:1.55}
  .meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;align-items:center}
  .meta-pill{display:inline-block;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;white-space:nowrap}
  .mp-stars{background:#FFF8E1;color:#92600A;border:1px solid #F5DCA0}
  .mp-cost{background:#F0FAF5;color:var(--teal-dark);border:1px solid #C2E8D5}
  .mp-level{background:#EEF0F4;color:#334;border:1px solid #CDD0D8}
  .mp-season{background:#F3EFFE;color:#5E3A87;border:1px solid #C8B0F0}
  .content-wrap{padding:0 28px 48px;max-width:960px}
  .sec{margin-top:28px}
  .sec-title{font-size:15px;font-weight:800;color:var(--teal-dark);border-bottom:2px solid var(--teal-light);padding-bottom:7px;margin-bottom:14px}
  /* Cost table */
  .cost-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .cost-cell{background:var(--white);padding:13px 16px}
  .cc-label{font-size:11px;color:var(--muted);margin-bottom:5px}
  .cc-main{font-size:16px;font-weight:800;color:var(--teal)}
  .cc-sub{font-size:11px;color:var(--secondary);margin-top:2px}
  .cost-total{background:var(--teal-light);border:1px solid #C2E8D5;border-radius:8px;padding:10px 16px;margin-top:10px;font-size:13px;color:var(--teal-dark);font-weight:700}
  /* Highlights */
  .highlight-list{display:flex;flex-direction:column;gap:6px}
  .hl-item{display:flex;align-items:flex-start;gap:10px;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px}
  .hl-star{color:#F59E0B;font-size:13px;white-space:nowrap;font-weight:700;flex-shrink:0;min-width:42px}
  /* Operator cards */
  .op-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .op-card{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .op-head{background:#F5F8F6;padding:11px 14px;border-bottom:1px solid var(--border)}
  .op-name-link{font-weight:700;font-size:14px;color:var(--teal-dark);text-decoration:none}
  .op-name-link:hover{text-decoration:underline}
  .op-name-plain{font-weight:700;font-size:14px;color:var(--teal-dark)}
  .op-price{font-size:11px;color:var(--secondary);margin-top:3px}
  .op-body{padding:10px 14px;display:flex;flex-direction:column;gap:7px}
  .op-pros{background:#EDF7F0;border-left:3px solid #2A8A5E;border-radius:0 5px 5px 0;padding:7px 11px;font-size:12px;color:#1A5438;line-height:1.6}
  .op-cons{background:var(--red-light);border-left:3px solid var(--red);border-radius:0 5px 5px 0;padding:7px 11px;font-size:12px;color:#5a0000;line-height:1.6}
  /* KOL */
  .kol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
  .kol-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px 14px;text-decoration:none;color:var(--dark);display:block;transition:all .15s}
  .kol-card:hover{border-color:var(--teal-mid);background:var(--teal-light)}
  .kc-type{font-size:10px;color:var(--muted);margin-bottom:4px}
  .kc-title{font-size:12px;font-weight:700;color:var(--teal-dark);margin-bottom:4px;line-height:1.4}
  .kc-desc{font-size:11px;color:var(--secondary);line-height:1.45}
  /* Note / warn */
  .note{background:var(--amber-light);border-left:3px solid var(--amber);border-radius:6px;padding:9px 14px;font-size:12px;color:#6B3D00;line-height:1.55}
  .warn{background:var(--red-light);border-left:3px solid var(--red);border-radius:6px;padding:9px 14px;font-size:12px;color:#7a0000;line-height:1.55}
  .info{background:var(--teal-light);border-left:3px solid var(--teal);border-radius:6px;padding:9px 14px;font-size:12px;color:#064830;line-height:1.55}
  /* Schedule table */
  .tw{overflow-x:auto;margin:4px 0}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:var(--teal);color:#fff;padding:7px 11px;text-align:left;font-weight:600}
  td{padding:7px 11px;border-bottom:1px solid #EEF;vertical-align:top}
  tr:hover td{background:var(--teal-light)}
  .t-usd{font-weight:700;color:var(--teal)}
  .t-rec{background:rgba(29,158,117,.07)}
  .status-open{display:inline-block;background:#E8F5E9;color:#2E7D32;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700}
  .status-sold{display:inline-block;background:var(--red-light);color:var(--red);border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700}
  .status-tbd{display:inline-block;background:#EEF0F4;color:#556;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700}
  @media(max-width:600px){.content-wrap,.dest-hero{padding-left:16px;padding-right:16px}.op-grid{grid-template-columns:1fr}.kol-grid{grid-template-columns:1fr}.cost-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

if(!d){
  document.getElementById('topbar').style.background='#1a2e44';
  document.getElementById('topbar').innerHTML='<a class="back-btn" href="index.html">← 返回總覽</a><span style="font-size:14px;font-weight:700">目的地未找到</span>';
  document.getElementById('dest-content').innerHTML='<div style="padding:48px;text-align:center;color:#888">找不到 id="'+esc(id)+'" 的目的地，請回到總覽重新選擇。</div>';
} else {
  document.title = d.name+' — 潛旅資料庫';

  // topbar
  document.getElementById('topbar').style.background=d.color;
  document.getElementById('topbar').innerHTML=
    '<a class="back-btn" href="index.html">← 返回總覽</a>'
    +'<span style="font-size:15px;font-weight:800">'+d.fullname+'</span>'
    +'<span class="topbar-badge">'+d.level+'</span>';

  // hero
  var heroHtml='<div class="dest-code-badge" style="background:'+d.color+'">'+d.code+'</div>'
    +'<div class="dest-fullname">'+d.fullname+'</div>'
    +'<div class="dest-tagline">'+d.tagline+'</div>'
    +'<div class="meta-row">'
    +'<span class="meta-pill mp-stars">'+stars(d.stars)+' '+['','一星','二星','三星'][d.stars]+'推薦</span>'
    +'<span class="meta-pill mp-cost">'+d.costRange+'</span>'
    +'<span class="meta-pill mp-level">'+d.level+'</span>'
    +'<span class="meta-pill mp-season">'+d.season+'</span>'
    +'</div>';
  document.getElementById('dest-hero').innerHTML=heroHtml;

  // content
  var html='';

  // cost
  html+='<div class="sec"><div class="sec-title">費用明細</div>';
  html+='<div class="cost-grid">';
  d.costItems.forEach(function(c){
    html+='<div class="cost-cell"><div class="cc-label">'+c.label+'</div>'
      +'<div class="cc-main">'+c.main+'</div>'
      +(c.sub?'<div class="cc-sub">'+c.sub+'</div>':'')
      +'</div>';
  });
  html+='</div>';
  if(d.costNote) html+='<div class="cost-total">💰 '+d.costNote+'</div>';
  html+='</div>';

  // schedule (if exists)
  if(d.sched && d.sched.length){
    html+='<div class="sec"><div class="sec-title">船期狀態</div><div class="tw"><table>'
      +'<thead><tr><th>船名</th><th>代碼</th><th>出發/返回</th><th>價格</th><th>狀態</th></tr></thead><tbody>';
    d.sched.forEach(function(s){
      var sc=s.status==='open'?'status-open':s.status==='sold'?'status-sold':'status-tbd';
      var sl=s.status==='open'?'✅ 有艙位':s.status==='sold'?'❌ 已售罄':'❓ 待確認';
      html+='<tr'+(s.status==='open'?' class="t-rec"':'')+'>'
        +'<td>'+s.name+'</td><td>'+s.code+'</td><td>'+s.dates+'</td>'
        +'<td class="t-usd">'+s.price+'</td>'
        +'<td><span class="'+sc+'">'+sl+'</span>'+(s.note?'<br><span style="font-size:10px;color:#888">'+s.note+'</span>':'')+'</td>'
        +'</tr>';
    });
    html+='</tbody></table></div></div>';
  }

  // highlights
  html+='<div class="sec"><div class="sec-title">海洋亮點</div><div class="highlight-list">';
  d.highlights.forEach(function(h){
    html+='<div class="hl-item"><div class="hl-star">'+h.stars+'</div><div>'+h.text+'</div></div>';
  });
  html+='</div></div>';

  // warns
  if(d.warns && d.warns.length){
    html+='<div class="sec"><div class="warn">';
    d.warns.forEach(function(w){ html+='⚠️ '+w+'<br>'; });
    html+='</div></div>';
  }

  // operators
  if(d.operators && d.operators.length){
    html+='<div class="sec"><div class="sec-title">潛店 / 船宿評比</div><div class="op-grid">';
    d.operators.forEach(function(op){
      var nameHtml=op.url
        ?'<a class="op-name-link" href="'+op.url+'" target="_blank">'+op.name+' ↗</a>'
        :'<span class="op-name-plain">'+op.name+'</span>';
      html+='<div class="op-card"><div class="op-head">'+nameHtml
        +(op.price?'<div class="op-price">'+op.price+'</div>':'')+'</div>'
        +'<div class="op-body">';
      if(op.pros && op.pros.length)
        html+='<div class="op-pros">✅ '+op.pros.join('<br>✅ ')+'</div>';
      if(op.cons && op.cons.length)
        html+='<div class="op-cons">❌ '+op.cons.join('<br>❌ ')+'</div>';
      html+='</div></div>';
    });
    html+='</div></div>';
  }

  // kols
  if(d.kols && d.kols.length){
    html+='<div class="sec"><div class="sec-title">KOL 攻略 &amp; 參考資料</div><div class="kol-grid">';
    d.kols.forEach(function(k){
      html+='<a class="kol-card" href="'+k.url+'" target="_blank">'
        +'<div class="kc-type">'+k.type+'</div>'
        +'<div class="kc-title">'+k.title+'</div>'
        +'<div class="kc-desc">'+k.desc+'</div></a>';
    });
    html+='</div></div>';
  }

  document.getElementById('dest-content').innerHTML=html;
}
</script>
</body>
</html>
